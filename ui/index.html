<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScholarOne helper</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ScholarOne helper</h1>
        <p id="statusLine">Ready</p>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </header>

    <main>
      <section class="band">
        <h2>Run settings</h2>
        <div class="form-grid">
          <label class="wide">
            Start URL
            <input id="startUrl" type="url" value="https://mc.manuscriptcentral.com/kes">
          </label>
          <label>
            Max checked
            <input id="maxChecked" type="number" min="1" value="50">
          </label>
          <label>
            Older than days
            <input id="olderDays" type="number" min="1" value="30">
          </label>
          <label>
            Queue page
            <input id="queuePage" type="number" min="1" placeholder="auto">
          </label>
          <label>
            Slow ms
            <input id="slowMo" type="number" min="0" value="500">
          </label>
          <label>
            Max rejected
            <input id="maxRejected" type="number" min="1" placeholder="no limit">
          </label>
          <label class="checkbox-line">
            <input id="keepOpen" type="checkbox">
            Keep browser open
          </label>
        </div>
        <div class="actions">
          <button id="dryRunBtn" type="button">Run dry run</button>
          <button id="liveRunBtn" type="button" class="danger">Run + reject</button>
        </div>
      </section>

      <section class="band">
        <div class="section-title">
          <h2>Settings</h2>
          <span id="settingsStatus">Not saved</span>
        </div>
        <label class="message-label">
          Reject email body
          <textarea id="rejectMessage" rows="13" spellcheck="true"></textarea>
        </label>
        <div class="actions">
          <button id="saveSettingsBtn" type="button">Save settings</button>
          <button id="resetSettingsBtn" type="button">Reset saved settings</button>
        </div>
      </section>

      <section class="band">
        <div class="section-title">
          <h2>Reports</h2>
          <span id="selectedReport">No report selected</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Report</th>
                <th>Status</th>
                <th>Checked</th>
                <th>Would reject</th>
                <th>Rejected</th>
                <th>Progress</th>
              </tr>
            </thead>
            <tbody id="reportsBody">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="band">
        <h2>Reject from report</h2>
        <div class="actions">
          <button id="sendReportBtn" type="button" class="danger">Reject selected report</button>
        </div>
      </section>

      <section class="band">
        <div class="section-title">
          <h2>Job</h2>
          <button id="stopBtn" type="button" disabled>Stop</button>
        </div>
        <pre id="jobOutput">No active job.</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
